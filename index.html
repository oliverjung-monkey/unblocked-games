<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Unblocked Hub</title>
    <style>
        body { font-family: sans-serif; background: #121212; color: white; text-align: center; margin: 0; padding: 20px; }
        .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 20px; max-width: 1000px; margin: auto; }
        .card { background: #1e1e1e; padding: 20px; border-radius: 10px; cursor: pointer; transition: 0.3s; border: 1px solid #333; }
        .card:hover { transform: scale(1.05); background: #252525; border-color: #007bff; }
        iframe { width: 100%; height: 600px; border: none; display: none; border-radius: 10px; margin-top: 20px; }
        h1 { color: #007bff; }
        #back { display: none; margin-bottom: 20px; padding: 10px 20px; background: #007bff; border: none; color: white; cursor: pointer; border-radius: 5px; }
    </style>
</head>
<body>
    <h1>🎮 Unblocked Games</h1>
    <button id="back" onclick="showHome()">← Back to Games</button>
    
    <div id="game-list" class="grid">
        <div class="card" onclick="playGame('https://ubg77.github.io')"><h3>Slope</h3></div>
        <div class="card" onclick="playGame('https://google-opensocial.googleusercontent.com')"><h3>1v1.LOL</h3></div>
        <div class="card" onclick="playGame('https://tetris.com')"><h3>Tetris</h3></div>
    </div>

    <iframe id="game-frame"></iframe>

    <script>
        function playGame(url) {
            document.getElementById('game-list').style.display = 'none';
            document.getElementById('back').style.display = 'inline-block';
            const frame = document.getElementById('game-frame');
            frame.src = url;
            frame.style.display = 'block';
        }
        function showHome() {
            document.getElementById('game-list').style.display = 'grid';
            document.getElementById('back').style.display = 'none';
            const frame = document.getElementById('game-frame');
            frame.src = '';
            frame.style.display = 'none';
        }
    </script>
</body>
</html>
